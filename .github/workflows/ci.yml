name: CSV Processing CI

permissions:
  contents: write

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PYTHONUNBUFFERED: "1"

jobs:
  build-and-process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install Dependencies
        run: |
          echo "🔍 Installing dependencies..."
          python -m pip install --upgrade pip
          pip install -r requirements.txt -v
          echo "✅ Dependencies installed"

      - name: Prepare Directories
        run: |
          echo "🔍 Preparing directories..."
          mkdir -p input output
          rm -f output/*.csv
          echo "📁 Input files:"
          ls -la input/ || echo "⚠️ input/ empty"

      - name: Run PyTest
        run: |
          echo "🔍 Running tests..."
          pytest tests/ -v --tb=short || {
            echo "❌ TESTS FAILED";
            echo "💡 Run locally: pytest tests/ -v";
            exit 1;
          }
          echo "✅ Tests passed"

      - name: Run Data Processing
        run: |
          echo "🔍 Running main.py..."
          python main.py || {
            echo "❌ PROCESSING FAILED";
            echo "💡 Run locally: python main.py";
            echo "💡 Check functions/ imports match filenames";
            exit 1;
          }
          echo "✅ Processing complete"

      - name: Verify Output
        run: |
          echo "🔍 Verifying output..."
          ls -la output/
          COUNT=$(find output/ -name "processed_*.csv" | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "❌ No processed files found"
            exit 1
          fi
          echo "✅ Found $COUNT processed file(s)"
          # Check for !!! (should be removed)
          if grep -r "!!!" output/ 2>/dev/null; then
            echo "⚠️ WARNING: !!! found in output (check sanitization)"
          else
            echo "✅ No !!! found in output"
          fi

      - name: Commit Output
        if: github.event_name == 'push'
        run: |
          echo "🔍 Preparing commit..."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update output [skip ci]"
            git push || {
              echo "❌ Push failed - check repo permissions";
              exit 1;
            }
            echo "✅ Output committed"
          else
            echo "ℹ️ No changes to commit"
          fi
